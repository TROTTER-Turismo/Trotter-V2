<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Política de Privacidade</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            margin-bottom: 10px;
        }

        .container p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            line-height: 1.5;
            max-width: 600px;
        }

        a {
            color: #0f172a;
            text-decoration: none;
            transition: 0.2s;
            border: solid white 1px;
            border-radius: 20px 0;
            padding: 12px 70px;
            margin-top: 20px;
            background-color: white;
            font-weight: bold;
            display: inline-block;
            font-size: 1rem;
        }

        a:hover {
            color: #ffff;
            background-color: #0f172a;
            transform: translateY(-2px);
        }

        #preloader {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #ffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            padding: 20px;
        }

        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 157, 113, 0.1);
            border-left-color: #009D71;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            a {
                width: 100%;
                max-width: 320px;
                padding: 14px 20px;
            }
        }

        @media (max-width: 480px) {
            .container h1 {
                font-size: 2rem;
            }

            .container p {
                font-size: 0.95rem;
            }

            a {
                font-size: 0.95rem;
                border-radius: 14px 0;
            }

            .spinner {
                width: 35px;
                height: 35px;
            }
        }
    </style>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
            }, 800);
        });
    </script>
</head>

<body>
    <div id="preloader">
        <img src="img/logo-trotter.svg" alt="TROTTER" width="150">
        <div class="spinner"></div>
    </div>
    <div class="container">
        <h1>Política de Privacidade</h1>
        <p>A Trotter Turismo respeita sua privacidade e protege seus dados.</p>
        <p>Utilizamos autenticação segura via Firebase Authentication e Google Login.</p>
        <p>Nenhuma senha do Google é armazenada em nossos servidores.</p>
        <a href="index.html">Voltar ao Login</a>
    </div>
</body>

</html>
