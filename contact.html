<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        a {
            color: #0f172a;
            text-decoration: none;
            transition: 0.2s;
            border: solid white 1px;
            border-radius: 20px 0;
            padding: 12px 70px;
            margin-top: 20px;
            background-color: white;
            font-weight: bold;
            display: inline-block;
            text-align: center;
        }

        a:hover {
            color: #ffff;
            background-color: #0f172a;
            transform: translateY(-2px);
        }

        .contact-form {
            width: 100%;
            max-width: 600px;
            margin: 50px auto;
            padding: 35px;
            background: #111827;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .contact-form h1 {
            text-align: center;
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 10px;
        }

        .contact-form label {
            font-size: 14px;
            font-weight: 600;
            color: #f9fafb;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #374151;
            border-radius: 12px;
            background: #1f2937;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .contact-form textarea {
            resize: vertical;
            min-height: 140px;
        }

        .contact-form button {
            margin-top: 10px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .contact-form button:hover {
            transform: translateY(-2px);
            background: #1d4ed8;
        }

        #statusMessage {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

        #preloader {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #ffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            padding: 20px;
        }

        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 157, 113, 0.1);
            border-left-color: #009D71;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .contact-form {
                padding: 25px;
                margin: 30px auto;
            }

            a {
                width: 100%;
                max-width: 320px;
                padding: 14px 20px;
            }
        }

        @media (max-width: 480px) {
            .contact-form {
                padding: 20px;
                border-radius: 14px;
            }

            .contact-form h1 {
                font-size: 2rem;
            }

            .contact-form input,
            .contact-form textarea {
                font-size: 14px;
                padding: 12px;
            }

            .contact-form button {
                font-size: 15px;
                padding: 12px;
            }

            a {
                font-size: 14px;
                border-radius: 14px 0;
            }

            .spinner {
                width: 35px;
                height: 35px;
            }
        }
    </style>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
            }, 800);
        });
    </script>
</head>

<body>
    <div id="preloader">
        <img src="img/logo-trotter.svg" alt="TROTTER" width="150">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <h1>Contato</h1>
        <p>Email: trotterturismo@gmail.com</p>
        <p>Suporte ao cliente e dúvidas gerais.</p>

        <form action="https://formsubmit.co/trotterturismo@gmail.com" method="POST" class="contact-form">

            <label for="name">Nome</label>
            <input type="text" name="name" id="name" required>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" required>

            <label for="message">O que deseja?</label>
            <textarea name="message" id="message" rows="6" required></textarea>

            <button type="submit" id="submitBtn">Enviar</button>
            <span id="statusMessage"></span>

            <input type="hidden" name="_captcha" value="false">
        </form>
        <a href="index.html">Voltar ao Login</a>
    </div>

    <script>
        const form = document.querySelector(".contact-form");
        const button = document.getElementById("submitBtn");
        const statusMessage = document.getElementById("statusMessage");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            button.disabled = true;
            button.innerText = "Enviando...";

            const formData = new FormData(form);

            try {
                await fetch(form.action, {
                    method: "POST",
                    body: formData
                });

                statusMessage.innerText = "Enviado com sucesso!";
                statusMessage.style.color = "#22c55e";

                button.innerText = "Enviado ✓";

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2500);

            } catch (error) {
                statusMessage.innerText = "Erro ao enviar.";
                statusMessage.style.color = "#ef4444";

                button.disabled = false;
                button.innerText = "Enviar";
            }
        });
    </script>
</body>

</html>
