<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa | TROTTER</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/map.css">
    <link rel="icon" href="../img/logo-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <img src="../img/logo-trotter.svg" alt="TROTTER" class="logo">
            <nav class="desktop-nav">
                <a href="home.html" class="active">Início</a>
                <a href="explore.html">Explorar</a>
                <a href="map.html">Mapa</a>
            </nav>
            <div class="user-menu">
                <span id="user-name">Olá, Viajante</span>
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <main class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="busca-input" placeholder="Buscar lugares...">
                </div>
                
                <div class="filter-controls">
                    <div class="raio-control">
                        <label for="select-raio">Raio:</label>
                        <select id="select-raio">
                            <option value="1000">1 km</option>
                            <option value="3000">3 km</option>
                            <option value="5000" selected>5 km</option>
                            <option value="10000">10 km</option>
                            <option value="20000">20 km</option>
                        </select>
                    </div>
                    <button id="btn-atualizar" class="btn-refresh" title="Atualizar busca">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>

                <div class="category-tabs">
                    <button class="cat-tab ativo" data-cat="all">Todos</button>
                    <button class="cat-tab" data-cat="comer"><i class="fas fa-utensils"></i></button>
                    <button class="cat-tab" data-cat="visitar"><i class="fas fa-camera"></i></button>
                    <button class="cat-tab" data-cat="dormir"><i class="fas fa-bed"></i></button>
                </div>
            </div>

            <div id="lista-lugares" class="places-list">
                <!-- Cards de lugares via JS -->
                <div class="loading-state">
                    <div class="spinner-small"></div>
                    <p>Buscando lugares próximos...</p>
                </div>
            </div>
        </aside>

        <!-- Área do Mapa -->
        <section class="map-view">
            <div id="map"></div>
            
            <div class="map-floating-controls">
                <button id="btn-search-here" class="btn-search-area">
                    <i class="fas fa-sync-alt"></i> Buscar nesta área
                </button>
                <div class="location-status" id="location-status">
                    <span class="geo-dot"></span> Obtendo localização...
                </div>
                <button id="btn-my-location" class="control-btn" title="Minha Localização">
                    <i class="fas fa-crosshairs"></i>
                </button>
            </div>
        </section>
    </main>

    <!-- Modal Logout -->
    <div id="modal-logout" class="modal">
        <div class="modal-content">
            <h3>Sair da conta?</h3>
            <p>Você precisará fazer login novamente para acessar seus dados.</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancelar</button>
                <button id="modal-confirm" class="btn-danger">Sair</button>
            </div>
        </div>
    </div>

    <nav class="mobile-nav">
        <a href="home.html"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="explore.html"><i class="fas fa-search"></i><span>Explorar</span></a>
        <a href="map.html" class="active"><i class="fas fa-map-marked-alt"></i><span>Mapa</span></a>
    </nav>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script type="module" src="../js/map.js"></script>
</body>
</html>
