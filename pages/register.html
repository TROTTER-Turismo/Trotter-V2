<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | TROTTER</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="icon" href="../img/logo-icon.svg" type="image/svg+xml">
</head>
<body>
    <div id="preloader">
        <img src="../img/logo-trotter.svg" alt="TROTTER" width="150">
        <div class="spinner"></div>
    </div>

    <div class="auth-container">
        <div class="auth-visual">
            <div class="auth-visual-content">
                <img src="../img/logo-icon.svg" alt="T" class="floating-logo">
                <h1>Junte-se à <br><span>nossa comunidade</span></h1>
                <p>Explore os melhores lugares da sua região com recomendações personalizadas.</p>
            </div>
        </div>
        
        <div class="auth-form-container">
            <div class="auth-form-box">
                <img src="../img/logo-trotter.svg" alt="TROTTER" class="form-logo">
                <span class="tag">Comece agora</span>
                <h2>Criar conta</h2>
                <p class="subtitle">Preencha os dados abaixo para se cadastrar.</p>

                <form id="register-form">
                    <div class="input-group">
                        <label for="name">Nome Completo</label>
                        <input type="text" id="name" placeholder="Seu nome" required>
                    </div>
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Confirmar Senha</label>
                        <input type="password" id="confirm-password" placeholder="Repita sua senha" required>
                    </div>
                    <button type="submit" class="btn-submit">CRIAR CONTA</button>
                    <p id="auth-message" class="message"></p>
                </form>

                <div class="divider"><span>ou</span></div>

                <button class="btn-google" id="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                    Continuar com Google
                </button>

                <p class="switch-auth">
                    Já tem uma conta? <a href="../index.html">Fazer login</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="../js/auth.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
            }, 800);
        });
    </script>
</body>
</html>
