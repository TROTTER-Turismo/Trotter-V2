<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | TROTTER</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="icon" href="../img/logo-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <img src="../img/logo-trotter.svg" alt="TROTTER" class="logo">
            <nav class="desktop-nav">
                <a href="home.html" class="active">Início</a>
                <a href="explore.html">Explorar</a>
                <a href="map.html">Mapa</a>
            </nav>
            <div class="user-menu">
                <span id="user-name"></span>
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>O que você quer fazer <br><span>hoje?</span></h1>
                <p>Descubra os melhores lugares ao seu redor com base na sua localização.</p>
                
                <div class="category-grid">
                    <a href="explore.html?cat=comer" class="category-card">
                        <div class="icon-box"><i class="fas fa-utensils"></i></div>
                        <span>Comer</span>
                    </a>
                    <a href="explore.html?cat=visitar" class="category-card">
                        <div class="icon-box"><i class="fas fa-camera"></i></div>
                        <span>Visitar</span>
                    </a>
                    <a href="explore.html?cat=dormir" class="category-card">
                        <div class="icon-box"><i class="fas fa-bed"></i></div>
                        <span>Dormir</span>
                    </a>
                </div>
            </div>
        </section>

        <section class="featured">
            <div class="container">
                <div class="section-header">
                    <h2>Destaques na sua região</h2>
                    <a href="explore.html" class="view-all">Ver todos <i class="fas fa-arrow-right"></i></a>
                </div>
                <div class="places-grid" id="featured-places">
                </div>
            </div>
        </section>
    </main>

    <nav class="mobile-nav">
        <a href="home.html" class="active"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="explore.html"><i class="fas fa-search"></i><span>Explorar</span></a>
        <a href="home.html"><i class="fas fa-home"></i><span>Mapa</span></a>
    </nav>

    <script type="module" src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
